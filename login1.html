<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#4facfe;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid wheat;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: gold;
}

a {
    text-decoration: none;
    color: blue;
    font-size: 14px;
}

p {
    text-align: center;
}
</style>

</head>
<body>

<div class="container">
    <h2>Login</h2>
    <form action="./biography1.html">
        
        <input type="email" name="email" placeholder="Enter Email" >
        <input type="password" name="password" placeholder="Enter Password">

        <div style="text-align:right;">
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Login</button>

        <p>Don't have an account? <a href="./index.html">Register</a></p>

    </form>
</div>

</body>
</html>
